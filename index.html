<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLens 旅遊視覺資產管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(120px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
        .scan-line { animation: scan 1.5s ease-in-out infinite alternate; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* 隱藏原生 details 的標記 */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- === 系統登入護城河 === -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-900/60 backdrop-blur-md transition-opacity duration-300 px-4">
        <div class="bg-white rounded-2xl p-6 md:p-8 w-full max-w-sm shadow-2xl transform transition-all animate-fadeIn text-center">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                <i data-lucide="lock" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">TravelLens</h2>
            <p class="text-sm text-gray-500 mb-6">請輸入高強度密碼進入系統 (預設: Travel@2026!)</p>
            <form onsubmit="window.handleLogin(event)">
                <input type="password" id="password-input" placeholder="需含大小寫、數字與符號..." class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-3 transition-all text-center tracking-widest" autofocus />
                <p id="login-error" class="text-red-500 text-xs mb-4 hidden">密碼錯誤，請再試一次</p>
                <button type="submit" class="w-full bg-blue-600 text-white rounded-lg px-4 py-3 font-medium hover:bg-blue-700 transition-colors shadow-md">
                    進入系統
                </button>
            </form>
        </div>
    </div>

    <!-- 系統主體 -->
    <div class="flex flex-col md:flex-row min-h-screen relative hidden" id="app">
        <!-- 1. 左側過濾面板 -->
        <aside class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col h-auto md:h-screen shrink-0 z-10">
            <div class="p-5 border-b border-gray-100 shrink-0">
                <h1 class="text-xl font-bold tracking-wider text-gray-900 flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-blue-600 w-5 h-5"></i> TravelLens
                </h1>
                <div id="auth-status" class="mt-2 text-xs font-medium"></div>
            </div>
            <div class="p-5 flex-1 overflow-y-auto max-h-[40vh] md:max-h-none">
                <div class="relative mb-6">
                    <input type="text" id="searchInput" placeholder="搜尋關鍵字..." class="w-full pl-9 pr-3 py-2 bg-gray-100 border-transparent rounded-md text-sm focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                </div>
                <div id="filters-container"></div>
            </div>
        </aside>

        <!-- 2. 中央照片網格 -->
        <main class="w-full md:flex-1 flex flex-col h-[70vh] md:h-screen overflow-hidden z-10 bg-gray-50 shrink-0">
            <header class="h-auto md:h-16 py-3 md:py-0 bg-white border-b border-gray-200 flex flex-col md:flex-row items-center justify-between px-6 shrink-0 gap-3 md:gap-0">
                <div id="gallery-stats" class="flex items-center gap-2 text-sm text-gray-500"></div>
                <div class="flex items-center gap-4">
                    <button onclick="window.clearFilters()" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">清除條件</button>
                    <input type="file" accept="image/*" multiple class="hidden" id="fileInput" onchange="window.handleBatchUpload(event)" />
                    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-sm whitespace-nowrap cursor-pointer">
                        <i data-lucide="layers" class="w-4 h-4"></i> 批量上傳
                    </button>
                </div>
            </header>
            <div id="gallery-container" class="flex-1 overflow-y-auto p-4 md:p-6"></div>
        </main>

        <!-- 3. 右側企劃板 -->
        <aside class="w-full md:w-72 bg-white border-t md:border-t-0 md:border-l border-gray-200 flex flex-col h-auto md:h-screen shadow-none md:shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10 shrink-0">
            <div class="p-5 border-b border-gray-100 bg-gray-50/50 shrink-0">
                <h2 class="text-lg font-bold text-gray-900 flex items-center justify-between mb-3">
                    專案排版資源夾
                    <span id="moodboard-count" class="bg-blue-100 text-blue-700 text-xs py-0.5 px-2 rounded-full">0 張</span>
                </h2>
                <!-- 修改區：年份與期數設定 -->
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="block text-[10px] text-gray-400 font-bold mb-1 uppercase">發行年份</label>
                        <select id="project-year" class="w-full bg-white border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="2026" selected>2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-[10px] text-gray-400 font-bold mb-1 uppercase">雜誌期數</label>
                        <input type="text" id="project-issue" placeholder="Vol.12" class="w-full bg-white border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-blue-500 outline-none" />
                    </div>
                </div>
            </div>
            <div id="moodboard-items" class="flex-1 overflow-y-auto p-4 space-y-4 max-h-[40vh] md:max-h-none"></div>
            <div class="p-4 border-t border-gray-100 bg-white shrink-0">
                <button id="exportBtn" onclick="window.handleExport()" disabled class="w-full py-2.5 rounded-md text-sm font-medium transition-colors bg-gray-100 text-gray-400 cursor-not-allowed">
                    匯出排版資源 (ZIP)
                </button>
            </div>
        </aside>
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- 系統邏輯腳本 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAfB6THM5bJNd5wsBwpabMCkEak80xcMrc",
            authDomain: "photo-ed222.firebaseapp.com",
            projectId: "photo-ed222",
            storageBucket: "photo-ed222.firebasestorage.app",
            messagingSenderId: "51793855852",
            appId: "1:51793855852:web:6131f60dc0fdb866a7df49",
            measurementId: "G-DSFKWWLQV0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'travel-lens-prod';

        const SAMPLE_PHOTOS = [
            { url: 'https://images.unsplash.com/photo-1493770348161-369560ae357d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', title: '法國巴黎-餐飲與美食-2026-Vol.12', content: '餐飲與美食', year: '2026', issue: 'Vol.12', locationCity: '法國-巴黎', locationDist: '' },
            { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', title: '台灣花蓮-自然與人文-2026-Vol.13', content: '自然與人文', year: '2026', issue: 'Vol.13', locationCity: '台灣-花蓮', locationDist: '秀林鄉' }
        ];

        const state = {
            user: null,
            photos: [],
            categories: {
                content: ['景點與娛樂', '餐飲與美食', '住宿與交通', '自然與人文'], 
                year: ['2026', '2027', '2028'],
                issue: ['Vol.12', 'Vol.13', 'Vol.14'],
                // 將地點改為樹狀結構： { "台灣-花蓮": ["花蓮市", "秀林鄉"], "日本-東京": ["新宿區"] }
                locationHierarchy: {
                    '台灣-花蓮': ['花蓮市', '吉安鄉', '秀林鄉'],
                    '台灣-墾丁': ['恆春鎮'],
                    '日本-東京': ['新宿區', '澀谷區'],
                    '日本-北海道': [],
                    '法國-巴黎': []
                }
            },
            searchQuery: '',
            filters: { content: [], year: [], issue: [], locationCity: [], locationDist: [] },
            moodBoard: [],
            isLoading: true,
            isBatchModalOpen: false,
            batchStatus: 'idle',
            uploadBatch: [],
            tagModal: { isOpen: false, type: '', error: '', parentCity: '' },
            newTagValue: '',
            confirmDialog: { isOpen: false, message: '', action: null },
            editModal: { isOpen: false, photo: null }
        };

        let unsubTags = null;
        let unsubPhotos = null;

        window.handleLogin = (e) => {
            e.preventDefault();
            const now = Date.now();
            const lockoutUntil = parseInt(localStorage.getItem('travelLensLockout') || '0', 10);
            if (now < lockoutUntil) {
                const remaining = Math.ceil((lockoutUntil - now) / 1000);
                showLoginError(`嘗試次數過多，請等待 ${remaining} 秒後再試。`); return;
            }
            const pwd = document.getElementById('password-input').value;
            if (pwd === 'Travel@2026!') {
                localStorage.removeItem('travelLensAttempts'); localStorage.removeItem('travelLensLockout');
                document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
                initApp(); updateUI();
            } else {
                let attempts = parseInt(localStorage.getItem('travelLensAttempts') || '0', 10) + 1;
                localStorage.setItem('travelLensAttempts', attempts);
                if (attempts >= 5) {
                    localStorage.setItem('travelLensLockout', now + 3 * 60 * 1000);
                    showLoginError(`密碼錯誤達 5 次，系統鎖定 3 分鐘。`);
                } else showLoginError(`密碼錯誤，剩餘 ${5 - attempts} 次機會。`);
            }
        };

        function showLoginError(msg) {
            const errEl = document.getElementById('login-error'); errEl.innerText = msg; errEl.classList.remove('hidden');
            document.getElementById('password-input').value = ''; document.getElementById('password-input').focus();
        }

        async function initApp() {
            let localUid = localStorage.getItem('travelLensUid');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    const userCred = await signInWithCustomToken(auth, __initial_auth_token); localUid = userCred.user.uid;
                } else {
                    const userCred = await signInAnonymously(auth); localUid = userCred.user.uid;
                }
                localStorage.setItem('travelLensUid', localUid);
            } catch (authError) {
                console.warn("認證失敗", authError);
                if (!localUid) { localUid = 'user-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('travelLensUid', localUid); }
            }
            state.user = { uid: localUid }; updateUI();
            try {
                const tagsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'tags_v2');
                unsubTags = onSnapshot(tagsRef, (docSnap) => {
                    if (docSnap.exists()) { state.categories = { ...state.categories, ...docSnap.data() }; updateFilters(); updateModals(); }
                });
                const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                unsubPhotos = onSnapshot(photosRef, (snapshot) => {
                    const fetchedPhotos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedPhotos.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    state.photos = fetchedPhotos; state.isLoading = false; updateGallery(); updateMoodBoard();
                }, (error) => {
                    console.error("Fetch photos error:", error); state.isLoading = false;
                    if (error.code === 'permission-denied') {
                        document.getElementById('gallery-container').innerHTML = `<div class="h-full flex flex-col items-center justify-center px-6 text-center animate-fadeIn"><i data-lucide="shield-alert" class="w-20 h-20 mb-4 text-red-500"></i><h2 class="font-bold text-2xl mb-2 text-gray-800">資料庫連線權限異常</h2></div>`; lucide.createIcons();
                    } else updateGallery();
                });
            } catch (err) { console.error("Firestore Init Error:", err); }
        }

        function renderAuthStatus() {
            const el = document.getElementById('auth-status'); const btn = document.getElementById('uploadBtn');
            if (state.user) {
                el.innerHTML = `<span class="flex items-center text-green-600 bg-green-50 px-2 py-1 rounded-full"><i data-lucide="cloud" class="w-3 h-3 mr-1"></i> 雲端已連線</span>`;
                if (btn) btn.disabled = false;
            } else {
                el.innerHTML = `<span class="flex items-center text-red-500 bg-red-50 px-2 py-1 rounded-full"><i data-lucide="cloud-off" class="w-3 h-3 mr-1"></i> 雲端連線中...</span>`;
                if (btn) btn.disabled = true;
            }
        }

        function renderFilters() {
            const container = document.getElementById('filters-container');
            let html = '';
            
            // 1. 內容與體驗
            html += renderFilterSection('content', '內容與體驗', 'bookmark', 'blue', state.categories.content);
            // 2. 年份與期數 (移至左側供篩選)
            html += renderFilterSection('year', '發行年份', 'calendar', 'purple', state.categories.year);
            html += renderFilterSection('issue', '雜誌期數', 'book-open', 'orange', state.categories.issue);
            
            // 3. 巢狀地理位置
            html += `
            <div class="mb-6">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center justify-between">
                    <div class="flex items-center gap-2"><i data-lucide="map-pin" class="text-green-500 w-4 h-4"></i> 地理位置 (巢狀)</div>
                    <button onclick="window.openAddTagModal('locationCity')" class="text-gray-400 hover:text-green-600 bg-gray-100 hover:bg-green-50 p-1 rounded-full transition-colors" title="新增國家/縣市"><i data-lucide="plus" class="w-3 h-3"></i></button>
                </h3>
            `;
            
            Object.keys(state.categories.locationHierarchy).forEach(city => {
                const dists = state.categories.locationHierarchy[city];
                const isCityChecked = state.filters.locationCity.includes(city);
                
                html += `
                <details class="mb-2 group/details">
                    <summary class="flex items-center justify-between cursor-pointer py-1 hover:bg-gray-50 rounded select-none">
                        <div class="flex items-center gap-2 flex-1 pl-1">
                            <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-400 transition-transform group-open/details:rotate-90"></i>
                            <label class="flex items-center space-x-2 cursor-pointer flex-1" onclick="event.stopPropagation(); window.toggleFilter('locationCity', '${city}')">
                                <div class="w-4 h-4 rounded border flex items-center justify-center transition-colors ${isCityChecked ? 'bg-green-600 border-green-600' : 'border-gray-300 hover:border-green-500'}">
                                    ${isCityChecked ? '<i data-lucide="check" class="text-white w-3 h-3"></i>' : ''}
                                </div>
                                <span class="text-sm font-medium ${isCityChecked ? 'text-green-700' : 'text-gray-700'}">${city}</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover/details:opacity-100">
                            <button onclick="event.preventDefault(); window.openAddTagModal('locationDist', '${city}')" class="text-gray-400 hover:text-green-600 p-1" title="在此新增鄉鎮區"><i data-lucide="plus" class="w-3 h-3"></i></button>
                            <button onclick="event.preventDefault(); window.handleDeleteTag('locationCity', '${city}')" class="text-gray-400 hover:text-red-500 p-1" title="刪除"><i data-lucide="x" class="w-3 h-3"></i></button>
                        </div>
                    </summary>
                    <div class="pl-7 mt-1 space-y-1">
                `;
                
                if (dists.length === 0) {
                    html += `<p class="text-xs text-gray-400 italic pl-6 py-1">無子區域</p>`;
                } else {
                    dists.forEach(dist => {
                        const isDistChecked = state.filters.locationDist.includes(`${city}|${dist}`);
                        html += `
                        <div class="flex items-center justify-between group py-0.5">
                            <label class="flex items-center space-x-2 cursor-pointer flex-1 pl-1" onclick="event.preventDefault(); window.toggleFilter('locationDist', '${city}|${dist}')">
                                <div class="w-3.5 h-3.5 rounded border flex items-center justify-center transition-colors ${isDistChecked ? 'bg-green-500 border-green-500' : 'border-gray-300 hover:border-green-400'}">
                                    ${isDistChecked ? '<i data-lucide="check" class="text-white w-2.5 h-2.5"></i>' : ''}
                                </div>
                                <span class="text-sm text-gray-600">${dist}</span>
                            </label>
                            <button onclick="window.handleDeleteTag('locationDist', '${city}|${dist}', event)" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                        </div>`;
                    });
                }
                html += `</div></details>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderFilterSection(id, title, icon, color, options) {
            let html = `
            <div class="mb-6">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center justify-between">
                    <div class="flex items-center gap-2"><i data-lucide="${icon}" class="text-${color}-500 w-4 h-4"></i> ${title}</div>
                    <button onclick="window.openAddTagModal('${id}')" class="text-gray-400 hover:text-${color}-600 bg-gray-100 hover:bg-${color}-50 p-1 rounded-full transition-colors" title="新增標籤"><i data-lucide="plus" class="w-3 h-3"></i></button>
                </h3>
            `;
            (options || []).forEach(cat => {
                const isChecked = state.filters[id].includes(cat);
                html += `
                <div class="flex items-center justify-between group mb-2 pl-1">
                    <label class="flex items-center space-x-2 cursor-pointer flex-1" onclick="event.preventDefault(); window.toggleFilter('${id}', '${cat}')">
                        <div class="w-4 h-4 rounded border flex items-center justify-center transition-colors ${isChecked ? `bg-${color}-600 border-${color}-600` : `border-gray-300 group-hover:border-${color}-500`}">
                            ${isChecked ? '<i data-lucide="check" class="text-white w-3 h-3"></i>' : ''}
                        </div>
                        <span class="text-sm text-gray-700">${cat}</span>
                    </label>
                    <button onclick="window.handleDeleteTag('${id}', '${cat}', event)" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded" title="刪除標籤">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>`;
            });
            html += `</div>`;
            return html;
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            const stats = document.getElementById('gallery-stats');
            if (container.innerHTML.includes('資料庫連線權限異常')) return;

            const filteredPhotos = state.photos.filter(photo => {
                const matchSearch = photo.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || 
                                    (photo.locationCity && photo.locationCity.toLowerCase().includes(state.searchQuery.toLowerCase())) ||
                                    (photo.locationDist && photo.locationDist.toLowerCase().includes(state.searchQuery.toLowerCase()));
                const matchContent = state.filters.content.length === 0 || state.filters.content.includes(photo.content);
                const matchYear = state.filters.year.length === 0 || state.filters.year.includes(photo.year);
                const matchIssue = state.filters.issue.length === 0 || state.filters.issue.includes(photo.issue);
                
                // 巢狀地點過濾邏輯
                let matchLocation = true;
                if (state.filters.locationCity.length > 0 || state.filters.locationDist.length > 0) {
                    const cityMatch = state.filters.locationCity.includes(photo.locationCity);
                    const distMatch = state.filters.locationDist.includes(`${photo.locationCity}|${photo.locationDist}`);
                    matchLocation = cityMatch || distMatch;
                }
                
                return matchSearch && matchContent && matchYear && matchIssue && matchLocation;
            });

            stats.innerHTML = `<i data-lucide="filter" class="w-4 h-4"></i> 共 ${state.photos.length} 張 / 篩選 ${filteredPhotos.length} 張`;

            if (state.isLoading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400"><i data-lucide="refresh-cw" class="animate-spin mb-4 text-blue-500 w-8 h-8"></i><p>載入圖庫中...</p></div>`; return;
            }
            if (state.photos.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 py-10"><i data-lucide="image" class="w-16 h-16 mb-4 opacity-20"></i><p class="mb-6 text-sm">圖庫目前是空的</p><button onclick="window.handleImportSamples()" class="px-6 py-2 bg-gray-900 text-white rounded-lg">匯入範例</button></div>`; return;
            }
            if (filteredPhotos.length === 0) {
                 container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 py-10"><i data-lucide="filter" class="w-12 h-12 mb-4 opacity-20"></i><p>沒有符合條件的照片</p></div>`; return;
            }

            let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">`;
            filteredPhotos.forEach(photo => {
                const isSelected = state.moodBoard.some(p => p.id === photo.id);
                const locDisplay = [photo.locationCity, photo.locationDist].filter(Boolean).join(', ');
                html += `
                    <div class="group bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col">

        function updateUI() { renderAuthStatus(); updateFilters(); updateGallery(); updateMoodBoard(); updateModals(); }
        function updateFilters() { renderFilters(); lucide.createIcons(); }
        function updateGallery() { renderGallery(); lucide.createIcons(); }
        function updateMoodBoard() { renderMoodBoard(); lucide.createIcons(); }
        function updateModals() { renderModals(); lucide.createIcons(); }

        document.getElementById('searchInput').addEventListener('input', (e) => { state.searchQuery = e.target.value; updateGallery(); });

        window.toggleFilter = (type, value) => {
            const current = state.filters[type];
            if (current.includes(value)) state.filters[type] = current.filter(item => item !== value);
            else state.filters[type].push(value);
            updateFilters(); updateGallery();
        };

        window.clearFilters = () => {
            state.filters = { content: [], year: [], issue: [], locationCity: [], locationDist: [] };
            updateFilters(); updateGallery();
        };

        window.toggleMoodBoard = (photoId) => {
            const photo = state.photos.find(p => p.id === photoId) || state.moodBoard.find(p => p.id === photoId);
            if (!photo) return;
            const index = state.moodBoard.findIndex(p => p.id === photoId);
            if (index > -1) state.moodBoard.splice(index, 1);
            else state.moodBoard.push(photo);
            updateGallery(); updateMoodBoard();
        };

        window.openEditModal = (photoId) => {
            const photo = state.photos.find(p => p.id === photoId);
            if (photo) { state.editModal = { isOpen: true, photo: { ...photo } }; updateModals(); }
        };
        window.closeEditModal = () => { state.editModal = { isOpen: false, photo: null }; updateModals(); };
        window.updateEditModalTitle = (val) => { if (state.editModal.photo) state.editModal.photo.title = val; };
        
        window.updateEditModalField = (field, value) => {
            if (state.editModal.photo) {
                state.editModal.photo[field] = value;
                // 若更改縣市，清空區域
                if(field === 'locationCity' && state.editModal.photo.locationDist) {
                    state.editModal.photo.locationDist = '';
                }
                updateModals();
            }
        };

        window.savePhotoEdit = async () => {
            if (!state.user || !state.editModal.photo) return;
            const photo = state.editModal.photo;
            const title = photo.title.trim() || '未命名圖片';
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id), { 
                    title, content: photo.content || '', year: photo.year || '', issue: photo.issue || '', 
                    locationCity: photo.locationCity || '', locationDist: photo.locationDist || ''
                }, { merge: true });
                window.closeEditModal();
            } catch (err) { console.error(err); alert("儲存失敗"); }
        };

        window.updateNewTagValue = (val) => { state.newTagValue = val; };
        window.openAddTagModal = (type, parentCity = '') => {
            state.tagModal = { isOpen: true, type, parentCity, error: '' }; state.newTagValue = ''; updateModals();
        };
        window.closeTagModal = () => { state.tagModal.isOpen = false; updateModals(); };

        window.confirmAddTag = async () => {
            const inputEl = document.getElementById('newTagInput');
            const tag = inputEl ? inputEl.value.trim() : state.newTagValue.trim();
            const { type, parentCity } = state.tagModal;
            if (!tag) { state.tagModal.error = '不可為空'; updateModals(); return; }

            if (type === 'locationCity') {
                if (state.categories.locationHierarchy[tag]) { state.tagModal.error = '已存在'; updateModals(); return; }
                state.categories.locationHierarchy[tag] = [];
            } else if (type === 'locationDist') {
                if (state.categories.locationHierarchy[parentCity].includes(tag)) { state.tagModal.error = '已存在'; updateModals(); return; }
                state.categories.locationHierarchy[parentCity].push(tag);
            } else {
                if (!state.categories[type]) state.categories[type] = [];
                if (state.categories[type].includes(tag)) { state.tagModal.error = '已存在'; updateModals(); return; }
                state.categories[type].push(tag);
            }

            if (state.user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'tags_v2'), state.categories, { merge: true });
            state.tagModal.isOpen = false; updateModals(); updateFilters();
        };

        window.handleDeleteTag = (type, tagToDelete, e) => {
            if(e) e.stopPropagation();
            state.confirmDialog = {
                isOpen: true, message: `確定要刪除「${tagToDelete}」？ (不影響已標記的照片)`, isPrimary: false,
                action: async () => {
                    if (type === 'locationCity') {
                        delete state.categories.locationHierarchy[tagToDelete];
                        state.filters.locationCity = state.filters.locationCity.filter(t => t !== tagToDelete);
                    } else if (type === 'locationDist') {
                        const [city, dist] = tagToDelete.split('|');
                        state.categories.locationHierarchy[city] = state.categories.locationHierarchy[city].filter(t => t !== dist);
                        state.filters.locationDist = state.filters.locationDist.filter(t => t !== tagToDelete);
                    } else {
                        state.categories[type] = state.categories[type].filter(t => t !== tagToDelete);
                        state.filters[type] = state.filters[type].filter(t => t !== tagToDelete);
                    }
                    if (state.user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'tags_v2'), state.categories, { merge: true });
                    window.closeConfirmDialog(); updateFilters(); updateGallery();
                }
            };
            updateModals();
        };

        window.handleDeletePhoto = (id) => {
            if (!state.user) return;
            state.confirmDialog = {
                isOpen: true, message: "確定刪除這張照片？", isPrimary: false,
                action: async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id));
                        state.moodBoard = state.moodBoard.filter(p => p.id !== id); updateMoodBoard(); window.closeEditModal(); 
                    } catch (e) { console.error(e); }
                    window.closeConfirmDialog();
                }
            }; updateModals();
        };

        window.closeConfirmDialog = () => { state.confirmDialog = { isOpen: false, message: '', action: null, isPrimary: false }; updateModals(); };
        window.executeConfirmAction = () => { if (state.confirmDialog.action) state.confirmDialog.action(); };

        window.handleExport = () => {
            if (state.moodBoard.length === 0) return;
            // 讀取年份與期數
            const year = document.getElementById('project-year').value;
            let issue = document.getElementById('project-issue').value.trim();
            if(!issue) issue = "未命名專案";
            const safeIssue = issue.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
            const zipName = `TravelLens_${year}_${safeIssue}.zip`;

            state.confirmDialog = {
                isOpen: true, message: `將打包下載為 ${zipName} 嗎？`, isPrimary: true,
                action: async () => {
                    window.closeConfirmDialog();
                    const exportBtn = document.getElementById('exportBtn'); const origText = exportBtn.innerText;
                    exportBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline mr-1"></i> 下載中...'; exportBtn.disabled = true;
                    try {
                        const zip = new JSZip();
                        await Promise.all(state.moodBoard.map(async (photo, index) => {
                            try {
                                const response = await fetch(photo.url); const blob = await response.blob();
                                const ext = blob.type.split('/')[1] || 'jpg';
                                const safeTitle = (photo.title || '圖片').replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '');
                                zip.file(`${index + 1}_${safeTitle}.${ext}`, blob);
                            } catch (err) { zip.file(`Error_${index + 1}.txt`, `下載阻擋:\n${photo.url}`); }
                        }));
                        const zipBlob = await zip.generateAsync({ type: 'blob' });
                        const link = document.createElement('a'); link.href = URL.createObjectURL(zipBlob); link.download = zipName;
                        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(link.href);
                        state.moodBoard = []; updateGallery(); updateMoodBoard();
                    } catch (error) { alert('下載發生錯誤'); } 
                    finally { exportBtn.innerText = origText; exportBtn.disabled = false; }
                }
            }; updateModals();
        };

        window.handleImportSamples = async () => {
            if (!state.user) return; state.isLoading = true; updateGallery();
            try {
                const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                for (const s of SAMPLE_PHOTOS) await addDoc(pRef, { ...s, createdAt: Date.now() });
            } catch (e) { console.error(e); }
        };

        const compressImage = (file) => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = e => { const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const cvs = document.createElement('canvas'); let w = i.width, h = i.height;
                    if (w > h && w > 800) { h *= 800/w; w = 800; } else if (h > 800) { w *= 800/h; h = 800; }
                    cvs.width = w; cvs.height = h; cvs.getContext('2d').drawImage(i, 0, 0, w, h);
                    res(cvs.toDataURL('image/jpeg', 0.7));
                }; i.onerror = rej;
            }; r.onerror = rej;
        });

        window.handleBatchUpload = async (e) => {
            const files = Array.from(e.target.files); if (files.length === 0) return;
            state.isBatchModalOpen = true; state.batchStatus = 'analyzing'; updateModals();
            try {
                state.uploadBatch = await Promise.all(files.map(async (file, i) => ({
                    id: `batch-${Date.now()}-${i}`, url: await compressImage(file), originalName: file.name,
                    suggestions: { customText: '分析中...', content: '', year: '', issue: '', locationCity: '', locationDist: '' }
                }))); updateModals();
                setTimeout(() => {
                    const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)] || '';
                    state.uploadBatch = state.uploadBatch.map(item => {
                        const cty = rnd(Object.keys(state.categories.locationHierarchy));
                        const dst = cty ? rnd(state.categories.locationHierarchy[cty]) : '';
                        return { ...item, suggestions: {
                            customText: item.originalName.replace(/\.[^/.]+$/, "").substring(0, 10),
                            content: rnd(state.categories.content), year: rnd(state.categories.year), issue: rnd(state.categories.issue), locationCity: cty, locationDist: dst
                        }};
                    });
                    state.batchStatus = 'review'; updateModals();
                }, 2000);
            } catch (err) { state.batchStatus = 'idle'; state.isBatchModalOpen = false; updateModals(); } e.target.value = null;
        };

        window.updateBatchItemCustomText = (id, val) => { const i = state.uploadBatch.find(x=>x.id===id); if(i) i.suggestions.customText = val; };
        window.updateBatchItem = (id, fld, val) => { 
            const i = state.uploadBatch.find(x=>x.id===id); 
            if(i) {
                i.suggestions[fld] = val; 
                if(fld === 'locationCity' && i.suggestions.locationDist) i.suggestions.locationDist = ''; // 改縣市清空區域
            }
            updateModals(); 
        };
        window.removeBatchItem = (id) => { state.uploadBatch = state.uploadBatch.filter(i=>i.id!==id); if(!state.uploadBatch.length) window.closeBatchModal(); else updateModals(); };
        window.closeBatchModal = () => { state.isBatchModalOpen = false; updateModals(); setTimeout(()=>{state.batchStatus='idle';state.uploadBatch=[];}, 300); };

        window.handleSaveBatch = async () => {
            if (!state.user) return; state.batchStatus = 'saving'; updateModals();
            try {
                const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                for (const item of state.uploadBatch) {
                    const s = item.suggestions;
                    const tags = [s.locationCity, s.locationDist, s.content, s.year, s.issue].filter(Boolean);
                    let finalTitle = [...tags, s.customText || ''].filter(Boolean).join('-');
                    await addDoc(pRef, { url: item.url, title: finalTitle || '未命名', content: s.content||'', year: s.year||'', issue: s.issue||'', locationCity: s.locationCity||'', locationDist: s.locationDist||'', createdAt: Date.now() });
                }
                window.closeBatchModal();
            } catch (e) { state.batchStatus = 'review'; updateModals(); }
        };

        lucide.createIcons(); 
    </script>
</body>
</html>
